#:schema node_modules/wrangler/config-schema.json

name = "subdomain-proxy"
main = "apps/web/workers/subdomain-proxy/index.ts"
compatibility_date = "2025-04-14"
compatibility_flags = ["nodejs_compat"]

[vars]
WORKER_URL = "https://multi-store-saas.ozzyl.workers.dev"

[observability]
enabled = true

# After deploying, add route in Cloudflare Dashboard:
# Workers & Pages -> subdomain-proxy -> Settings -> Triggers -> Routes
# Add: *.digitalcare.site/* (zone: digitalcare.site)
