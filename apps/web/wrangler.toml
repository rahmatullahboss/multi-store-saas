#:schema node_modules/wrangler/config-schema.json

name = "multi-store-saas"
compatibility_date = "2024-11-18"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# CLOUDFLARE PAGES CONFIGURATION
# ============================================================================
# For Pages deployment - Pages uses the functions directory automatically
# Deploy with: npx wrangler pages deploy ./build/client --project-name=multi-store-saas

pages_build_output_dir = "build/client"

# ============================================================================
# BINDINGS - Work in Pages Functions
# ============================================================================

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "multi-store-saas-db"
database_id = "bf882d16-d67a-4007-b503-33646bd693af"
migrations_dir = "../../packages/database/src/migrations"

# R2 Storage binding
# Create bucket first: wrangler r2 bucket create multi-store-saas-media
[[r2_buckets]]
binding = "R2"
bucket_name = "multi-store-saas-media"

# KV Namespace for AI Rate Limiting
# Create first: wrangler kv namespace create AI_RATE_LIMIT
[[kv_namespaces]]
binding = "AI_RATE_LIMIT"
id = "65513509a7a146d1b348548fb98a93cf"

# KV Namespace for Store/Tenant Caching (Fast Edge Cache)
# Created: wrangler kv namespace create STORE_CACHE
[[kv_namespaces]]
binding = "STORE_CACHE"
id = "026696313f02475c846dc70197a3c98f"

# Vectorize Database binding for AI RAG
# Create first: wrangler vectorize create multi-store-saas-vectors --dimensions=1536 --metric=cosine
[[vectorize]]
binding = "VECTORIZE"
index_name = "multi-store-saas-vectors"

# Cloudflare Workers AI Binding
[ai]
binding = "AI"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
[vars]
SAAS_DOMAIN = "ozzyl.com"  # Custom domain for the SaaS
R2_PUBLIC_URL = "https://pub-bec31ee88a08441a8824ab94bb973c04.r2.dev"  # R2 bucket public URL
SUPER_ADMIN_EMAIL = "rahmatullahzisan@gmail.com"  # Only this email can impersonate users
CLOUDFLARE_ZONE_ID = "41147efa7d197cfddda0af7fcbf6d641"  # Zone ID from Cloudflare Dashboard (ozzyl.com)
# CLOUDFLARE_API_TOKEN = "your_cloudflare_api_token_here"  # Commented to use OAuth login

# AI CONFIGURATION (Xiaomi Mimo or any OpenAI-compatible provider)
AI_MODEL = "mimo-v2-flash"  # Model ID for AI features
AI_BASE_URL = "https://api.xiaomimimo.com/v1"  # OpenAI-compatible API endpoint
PAGE_BUILDER_URL = "https://builder.ozzyl.com"  # Separate worker for GrapesJS editor

# IMPORTANT: Sensitive API keys must be set in Cloudflare Dashboard for security
# OPENROUTER_API_KEY - AI API key (Xiaomi Mimo or OpenRouter) - SET IN DASHBOARD (secret, not here)
# RESEND_API_KEY - Email service - SET IN DASHBOARD (secret)
# CLOUDFLARE_API_TOKEN - SSL certificates - SET IN DASHBOARD (secret)

# PUSH NOTIFICATIONS (VAPID)
VAPID_PUBLIC_KEY = "BDl0oSQqYgSjUMZxblMeN1nhfndIyhlAKDujKvNfQyo4gMGVlvKs2aInkK9-PiflVUSDxmPPyienIPQlHMZPwJU"

# Sentry DSN
SENTRY_DSN = "https://49f43a7c79f0476ad9a12671b579d42c@o4509758332141568.ingest.de.sentry.io/4510691126214736"

# Master Facebook Pixel for platform-wide audience aggregation
# Set your own Facebook Pixel ID here to collect data from all stores
MASTER_FACEBOOK_PIXEL_ID = ""  # Example: "123456789012345"

# Google OAuth Configuration
GOOGLE_CLIENT_ID = "477759293578-24qqc1l4mg7dtm2f44vtqbrme6p9cqa3.apps.googleusercontent.com"
# GOOGLE_CLIENT_SECRET - SET IN CLOUDFLARE DASHBOARD (secret, not here)

# ============================================================================
# DEVELOPMENT SETTINGS
# ============================================================================
[dev]
port = 8787
local_protocol = "http"
