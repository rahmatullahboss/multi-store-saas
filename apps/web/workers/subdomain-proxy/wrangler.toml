# Subdomain Proxy Worker Configuration
# Routes *.ozzyl.com/* requests to the main Workers instance
name = "wildcard-proxy"
main = "index.ts"
compatibility_date = "2025-04-14"
compatibility_flags = ["nodejs_compat"]

[vars]
WORKER_URL = "https://multi-store-saas.ozzyl.workers.dev"

# Routes for ozzyl.com subdomains
[[routes]]
pattern = "*.ozzyl.com/*"
zone_id = "41147efa7d197cfddda0af7fcbf6d641"
