# Subdomain Proxy Worker Configuration
# Handles *.ozzyl.com/* requests
name = "wildcard-proxy"
main = "subdomain-proxy/index.ts"
compatibility_date = "2025-04-14"
compatibility_flags = ["nodejs_compat"]

[vars]
WORKER_URL = "https://multi-store-saas.ozzyl.workers.dev"

# NOTE:
# Keep route ownership in the main app worker (`apps/web/wrangler.toml`) to avoid
# wildcard route conflicts across multiple workers.
