#:schema node_modules/wrangler/config-schema.json

name = "webhook-dispatcher"
main = "src/index.ts"
compatibility_date = "2025-04-14"
compatibility_flags = ["nodejs_compat"]

# Bind to the same D1 database to read subscriptions
[[d1_databases]]
binding = "DB"
database_name = "multi-store-saas-db"
database_id = "bf882d16-d67a-4007-b503-33646bd693af"
migrations_dir = "../../../../packages/database/src/migrations"

# Consume messages from the queue
[[queues.consumers]]
queue = "webhook-queue"
max_batch_size = 10
max_batch_timeout = 5
