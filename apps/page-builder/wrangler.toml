#:schema node_modules/wrangler/config-schema.json

name = "multi-store-saas-builder"
compatibility_date = "2024-11-18"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# CLOUDFLARE PAGES CONFIGURATION
# ============================================================================
# For Pages deployment - Pages uses the functions directory automatically
# Deploy with: npx wrangler pages deploy ./build/client --project-name=multi-store-saas-builder

pages_build_output_dir = "build/client"

# ============================================================================
# BINDINGS - Same as main app (shared D1, R2, KV)
# ============================================================================

# D1 Database binding (same as main app)
[[d1_databases]]
binding = "DB"
database_name = "multi-store-saas-db"
database_id = "bf882d16-d67a-4007-b503-33646bd693af"

# R2 Storage binding (same as main app)
[[r2_buckets]]
binding = "R2"
bucket_name = "multi-store-saas-media"

# KV Namespace for Store/Tenant Caching (same as main app)
[[kv_namespaces]]
binding = "STORE_CACHE"
id = "026696313f02475c846dc70197a3c98f"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
[vars]
SAAS_DOMAIN = "ozzyl.com"
R2_PUBLIC_URL = "https://pub-bec31ee88a08441a8824ab94bb973c04.r2.dev"
MAIN_APP_URL = "https://ozzyl.com"
SUPER_ADMIN_EMAIL = "rahmatullahzisan@gmail.com"
# NOTE: SESSION_SECRET should be set via Cloudflare Dashboard > Settings > Variables
# Must match the SESSION_SECRET from the main app for cross-subdomain auth

# ============================================================================
# DEVELOPMENT SETTINGS
# ============================================================================
[dev]
port = 8788
local_protocol = "http"
