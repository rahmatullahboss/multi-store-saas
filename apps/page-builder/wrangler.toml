#:schema node_modules/wrangler/config-schema.json

name = "multi-store-saas-builder"
compatibility_date = "2025-04-14"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# CLOUDFLARE WORKER CONFIGURATION
# ============================================================================
# For Worker deployment with explicit route control
# Deploy with: npx wrangler deploy

# Worker entry point
main = "worker.ts"

# Static assets from Remix client build
# CRITICAL: run_worker_first prevents SPA fallback from intercepting API routes
[assets]
directory = "build/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/auth/*"]

# Routes - explicit routing for builder subdomain
[[routes]]
pattern = "builder.ozzyl.com/*"
zone_name = "ozzyl.com"

# ============================================================================
# BINDINGS - Same as main app (shared D1, R2, KV)
# ============================================================================

# D1 Database binding (same as main app)
[[d1_databases]]
binding = "DB"
database_name = "multi-store-saas-db"
database_id = "bf882d16-d67a-4007-b503-33646bd693af"

# R2 Storage binding (same as main app)
[[r2_buckets]]
binding = "R2"
bucket_name = "multi-store-saas-media"

# KV Namespace for Store/Tenant Caching (same as main app)
[[kv_namespaces]]
binding = "STORE_CACHE"
id = "026696313f02475c846dc70197a3c98f"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
[vars]
SAAS_DOMAIN = "ozzyl.com"
R2_PUBLIC_URL = "https://pub-bec31ee88a08441a8824ab94bb973c04.r2.dev"
MAIN_APP_URL = "https://ozzyl.com"
SUPER_ADMIN_EMAIL = "rahmatullahzisan@gmail.com"
# NOTE: SESSION_SECRET should be set via Cloudflare Dashboard > Settings > Variables
# Must match the SESSION_SECRET from the main app for cross-subdomain auth

# ============================================================================
# OBSERVABILITY - Permanent Logs Storage
# ============================================================================
[observability]
enabled = true

# ============================================================================
# DEVELOPMENT SETTINGS
# ============================================================================
[dev]
port = 8788
local_protocol = "http"
