name = "ozzyl-landing"
compatibility_date = "2025-04-14"
compatibility_flags = ["nodejs_compat"]
main = "./worker.ts"
assets = { directory = "./build/client" }

# Force wrangler to resolve modules from landing's local node_modules first,
# preventing React 19 from the monorepo root from overriding React 18.
find_additional_modules = true

[observability]
enabled = true


[vars]
OZZYL_APP_API_BASE = "https://app.ozzyl.com"

[env.preview]
name = "ozzyl-landing-preview"

[env.preview.vars]
OZZYL_APP_API_BASE = "https://multi-store-saas-staging.rahmatullahzisan.workers.dev"
