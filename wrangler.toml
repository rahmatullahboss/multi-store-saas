#:schema node_modules/wrangler/config-schema.json

name = "multi-store-saas"
compatibility_date = "2024-11-18"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# CLOUDFLARE PAGES CONFIGURATION
# ============================================================================
# For Pages deployment - Pages uses the functions directory automatically
# Deploy with: npx wrangler pages deploy ./build/client --project-name=multi-store-saas

pages_build_output_dir = "build/client"

# ============================================================================
# BINDINGS - Work in Pages Functions
# ============================================================================

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "multi-store-saas-db"
database_id = "bf882d16-d67a-4007-b503-33646bd693af"
migrations_dir = "db/migrations"

# R2 Storage binding
# Create bucket first: wrangler r2 bucket create multi-store-saas-media
[[r2_buckets]]
binding = "R2"
bucket_name = "multi-store-saas-media"

# KV Namespace for AI Rate Limiting
# Create first: wrangler kv namespace create AI_RATE_LIMIT
[[kv_namespaces]]
binding = "AI_RATE_LIMIT"
id = "65513509a7a146d1b348548fb98a93cf"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
[vars]
SAAS_DOMAIN = "digitalcare.site"  # Custom domain for the SaaS
R2_PUBLIC_URL = "https://pub-bec31ee88a08441a8824ab94bb973c04.r2.dev"  # R2 bucket public URL
SUPER_ADMIN_EMAIL = "rahmatullahzisan@gmail.com"  # Only this email can impersonate users
CLOUDFLARE_ZONE_ID = "YOUR_ZONE_ID_HERE"  # Zone ID from Cloudflare Dashboard (digitalcare.site)
# IMPORTANT: Sensitive API keys must be set in Cloudflare Dashboard for security
# OPENROUTER_API_KEY - AI chatbot - SET IN DASHBOARD (secret, not here)
# RESEND_API_KEY - Email service - SET IN DASHBOARD (secret)
# CLOUDFLARE_API_TOKEN - SSL certificates - SET IN DASHBOARD (secret)

# PUSH NOTIFICATIONS (VAPID)
VAPID_PUBLIC_KEY = "BDl0oSQqYgSjUMZxblMeN1nhfndIyhlAKDujKvNfQyo4gMGVlvKs2aInkK9-PiflVUSDxmPPyienIPQlHMZPwJU"
# WARNING: Ideally set PRIVATE KEY in Cloudflare Dashboard > Settings > Environment Variables for better security
VAPID_PRIVATE_KEY = "0lRtb9KYpwEWgeZGaZEyD-eIp7lwngMC1gYCGAq2XWg"

# ============================================================================
# DEVELOPMENT SETTINGS
# ============================================================================
[dev]
port = 8787
local_protocol = "http"
