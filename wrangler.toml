#:schema node_modules/wrangler/config-schema.json

name = "multi-store-saas"
compatibility_date = "2024-11-18"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# CLOUDFLARE PAGES CONFIGURATION
# ============================================================================
# For Pages deployment - Pages uses the functions directory automatically
# Deploy with: npx wrangler pages deploy ./build/client --project-name=multi-store-saas

pages_build_output_dir = "build/client"

# ============================================================================
# BINDINGS - Work in both Workers and Pages
# ============================================================================

[observability]
enabled = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "multi-store-saas-db"
database_id = "bf882d16-d67a-4007-b503-33646bd693af"
migrations_dir = "db/migrations"

# R2 Storage binding
# Create bucket first: wrangler r2 bucket create multi-store-saas-media
[[r2_buckets]]
binding = "R2"
bucket_name = "multi-store-saas-media"

# KV Namespace for AI Rate Limiting
# Create first: wrangler kv namespace create AI_RATE_LIMIT
[[kv_namespaces]]
binding = "AI_RATE_LIMIT"
id = "65513509a7a146d1b348548fb98a93cf"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
[vars]
SAAS_DOMAIN = "digitalcare.site"  # Custom domain for the SaaS
# OPENROUTER_API_KEY - AI chatbot (Get from https://openrouter.ai/keys)
# R2_PUBLIC_URL - Set in Cloudflare Dashboard > Pages > Settings > Environment Variables
# RESEND_API_KEY - Set in Cloudflare Dashboard > Pages > Settings > Environment Variables
# CLOUDFLARE_API_TOKEN - Set in Cloudflare Dashboard (SSL and Certificates: Edit permission)
# CLOUDFLARE_ZONE_ID - Found in Cloudflare Zone Overview page

# ============================================================================
# DEVELOPMENT SETTINGS
# ============================================================================
[dev]
port = 8787
local_protocol = "http"

# ============================================================================
# PAGES FUNCTIONS CONFIGURATION
# ============================================================================
# When deploying to Pages, the functions are auto-discovered from:
# - functions/ directory (for catch-all SSR)
# - Or using the Remix adapter which handles this automatically

# For local development with Pages:
# wrangler pages dev ./build/client --d1=DB --r2=R2

# For production deployment:
# 1. Build: npm run build
# 2. Deploy: wrangler pages deploy ./build/client --project-name=multi-store-saas
# 3. Configure bindings in Cloudflare Dashboard > Pages > Settings > Functions

# ============================================================================
# CLOUDFLARE QUEUES - Email Campaign Scheduling (DISABLED)
# ============================================================================
# Queue is disabled for now. Email campaigns will run synchronously.
# To enable later:
# 1. Enable Queues at: https://dash.cloudflare.com > Workers > Queues
# 2. Create queue: npx wrangler queues create email-campaign-queue
# 3. Uncomment the producer binding below:
#
# [[queues.producers]]
# binding = "EMAIL_QUEUE"
# queue = "email-campaign-queue"
