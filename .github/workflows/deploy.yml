# ============================================================================
# Production CI/CD Pipeline — Ozzyl Multi Store SaaS
# ============================================================================
#
# Flow:
#   PR        → validate (typecheck + tests + security)
#   merge → staging → (auto) → production (after health check passes)
#
# Environments:
#   staging    → multi-store-saas-staging worker  (auto-deploy on merge to main)
#   production → multi-store-saas worker           (auto-deploy after staging health check)
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token (Workers:Edit, D1:Edit)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
#   HEALTH_CHECK_TOKEN     — Same value as wrangler secret HEALTH_CHECK_TOKEN
#   STAGING_URL            — e.g. https://multi-store-saas-staging.workers.dev
#   PRODUCTION_URL         — e.g. https://app.ozzyl.com
# ============================================================================

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  WORKER_NAME: 'multi-store-saas'

jobs:
  # ============================================================================
  # 1. VALIDATE — typecheck + tests + security (always runs first)
  # ============================================================================
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Type check
        run: npm run typecheck
        working-directory: apps/web

      - name: 🧪 Run tests
        run: npm run test
        working-directory: apps/web

      - name: 🔒 Secret scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true

      - name: 🔒 Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ============================================================================
  # 2. BUILD — compile once, reuse artifact in both deploys
  # ============================================================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build
        working-directory: apps/web

      - name: 📊 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: apps/web/build/
          retention-days: 7

  # ============================================================================
  # 3. DEPLOY TO STAGING
  # ============================================================================
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: apps/web/build/

      - name: 🚀 Deploy to Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy --env=staging

      - name: ⏳ Wait for deployment to propagate
        run: sleep 15

      - name: 🏥 Staging health check
        run: |
          HEALTH_URL="${{ vars.STAGING_URL }}/api/healthz"
          TOKEN="${{ secrets.HEALTH_CHECK_TOKEN }}"

          echo "Checking health at: $HEALTH_URL"

          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
              -H "x-health-token: $TOKEN" "$HEALTH_URL")

            echo "Attempt $i — HTTP $RESPONSE"
            cat /tmp/health.json

            if [ "$RESPONSE" = "200" ]; then
              STATUS=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
              echo "Health status: $STATUS"

              if [ "$STATUS" = "ok" ] || [ "$STATUS" = "degraded" ]; then
                echo "✅ Staging is healthy!"
                exit 0
              fi
            fi

            echo "Retrying in 10s..."
            sleep 10
          done

          echo "❌ Staging health check failed after 5 attempts"
          exit 1

  # ============================================================================
  # 4. DEPLOY TO PRODUCTION (only after staging is healthy)
  # ============================================================================
  deploy-production:
    name: 🚀 Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: apps/web/build/

      - name: 🚀 Deploy to Production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy --env=production

      - name: ⏳ Wait for deployment to propagate
        run: sleep 20

      - name: 🏥 Production health check
        id: health-check
        run: |
          HEALTH_URL="${{ vars.PRODUCTION_URL }}/api/healthz"
          TOKEN="${{ secrets.HEALTH_CHECK_TOKEN }}"

          echo "Checking health at: $HEALTH_URL"

          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
              -H "x-health-token: $TOKEN" "$HEALTH_URL")

            echo "Attempt $i — HTTP $RESPONSE"
            cat /tmp/health.json

            if [ "$RESPONSE" = "200" ]; then
              STATUS=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
              echo "Health status: $STATUS"

              if [ "$STATUS" = "ok" ]; then
                echo "✅ Production is healthy!"
                echo "healthy=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi

            echo "Retrying in 10s..."
            sleep 10
          done

          echo "healthy=false" >> $GITHUB_OUTPUT
          echo "❌ Production health check failed!"
          exit 1

      - name: 🔄 Auto-rollback on health check failure
        if: failure() && steps.health-check.outputs.healthy == 'false'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: rollback --env=production

      - name: 🚨 Create rollback issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.substring(0, 7);

            await github.rest.issues.create({
              owner,
              repo,
              title: `🚨 Production Deploy Failed + Auto-Rolled Back — ${shortSha}`,
              body: [
                '## 🚨 Production Deployment Failed',
                '',
                `**Commit:** [\`${shortSha}\`](https://github.com/${owner}/${repo}/commit/${context.sha})`,
                `**Branch:** \`${context.ref}\``,
                `**Run:** [View Details](${runUrl})`,
                '',
                '## What happened',
                '- Deployed to production ✅',
                '- Post-deploy health check failed ❌',
                '- Auto-rollback triggered ✅',
                '',
                '## Action Required',
                '1. Check the failed workflow run for details',
                '2. Review logs: `wrangler tail --env=production`',
                '3. Fix the issue and push a new commit',
              ].join('\n'),
              labels: ['production-incident', 'auto-rollback', 'urgent'],
            });

  # ============================================================================
  # 5. NOTIFY SUCCESS
  # ============================================================================
  notify-success:
    name: 🎉 Notify Success
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()

    steps:
      - name: 🎉 Deployment summary
        run: |
          echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ✅ Healthy | ${{ vars.STAGING_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ✅ Healthy | ${{ vars.PRODUCTION_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
