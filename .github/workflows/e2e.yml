# E2E Tests with Playwright
# Runs on push to main/master and weekly schedule

name: E2E Tests

on:
  # E2E tests require a running wrangler dev server with D1 bindings.
  # They are run locally or triggered manually via workflow_dispatch.
  # Automatic triggers (push/PR/schedule) are disabled to avoid CI failures.
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  e2e-tests:
    name: 🎭 Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 📥 Fix rollup optional binary for Linux
        run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🏗️ Build application
        run: npm run build
        working-directory: apps/web

      - name: 📝 Create .dev.vars for Wrangler
        run: |
          cat > apps/web/.dev.vars << EOF
          SESSION_SECRET=e2e-test-session-secret-32chars
          COOKIE_SECRET=e2e-test-cookie-secret-32chars
          NODE_ENV=test
          EOF

      - name: 🗄️ Setup Local DB from schema
        run: npx wrangler d1 execute multi-store-saas-db --local --file=e2e-schema.sql
        working-directory: apps/web

      - name: 🌱 Seed E2E test data
        run: node db/seeds/seed-e2e.mjs
        working-directory: apps/web

      - name: 🧪 Run E2E tests
        run: npx playwright test --project=chromium
        working-directory: apps/web
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_MERCHANT_EMAIL: ${{ secrets.E2E_MERCHANT_EMAIL }}
          E2E_MERCHANT_PASSWORD: ${{ secrets.E2E_MERCHANT_PASSWORD }}
          SESSION_SECRET: test-session-secret-for-e2e
          COOKIE_SECRET: test-cookie-secret-for-e2e
          NODE_ENV: test

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: 📊 Upload test videos
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-videos
          path: test-results/
          retention-days: 7

  # Multi-browser tests (only on main branch)
  cross-browser:
    name: 🌐 Cross-Browser Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: e2e-tests

    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 📥 Fix rollup optional binary for Linux
        run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 🏗️ Build application
        run: npm run build
        working-directory: apps/web

      - name: 📝 Create .dev.vars for Wrangler
        run: |
          cat > apps/web/.dev.vars << EOF
          SESSION_SECRET=e2e-test-session-secret-32chars
          COOKIE_SECRET=e2e-test-cookie-secret-32chars
          NODE_ENV=test
          EOF

      - name: 🗄️ Setup Local DB from schema
        run: npx wrangler d1 execute multi-store-saas-db --local --file=e2e-schema.sql
        working-directory: apps/web

      - name: 🌱 Seed E2E test data
        run: node db/seeds/seed-e2e.mjs
        working-directory: apps/web

      - name: 🧪 Run ${{ matrix.browser }} tests
        run: npx playwright test --project=${{ matrix.browser }}
        working-directory: apps/web
        env:
          E2E_BASE_URL: http://localhost:5173
          SESSION_SECRET: test-session-secret-for-e2e
          COOKIE_SECRET: test-cookie-secret-for-e2e
          NODE_ENV: test

      - name: 📊 Upload ${{ matrix.browser }} report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  # Mobile tests
  mobile-tests:
    name: 📱 Mobile Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: e2e-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 📥 Fix rollup optional binary for Linux
        run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: 🏗️ Build application
        run: npm run build
        working-directory: apps/web

      - name: 📝 Create .dev.vars for Wrangler
        run: |
          cat > apps/web/.dev.vars << EOF
          SESSION_SECRET=e2e-test-session-secret-32chars
          COOKIE_SECRET=e2e-test-cookie-secret-32chars
          NODE_ENV=test
          EOF

      - name: 🗄️ Setup Local DB from schema
        run: npx wrangler d1 execute multi-store-saas-db --local --file=e2e-schema.sql
        working-directory: apps/web

      - name: 🌱 Seed E2E test data
        run: node db/seeds/seed-e2e.mjs
        working-directory: apps/web

      - name: 📱 Run mobile tests
        run: |
          npx playwright test --project="Mobile Chrome"
          npx playwright test --project="Mobile Safari"
        working-directory: apps/web
        env:
          E2E_BASE_URL: http://localhost:5173
          SESSION_SECRET: test-session-secret-for-e2e
          COOKIE_SECRET: test-cookie-secret-for-e2e
          NODE_ENV: test

      - name: 📊 Upload mobile report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-mobile
          path: playwright-report/
          retention-days: 7
