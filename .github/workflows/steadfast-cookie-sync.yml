name: Steadfast Cookie Sync

# Runs every 6 hours to refresh session cookies for all stores
# that have Steadfast email+password configured in their courier settings.
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    name: Sync Steadfast Cookies (All Stores)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright & deps
        run: |
          cd scripts/steadfast-cookie-sync
          npm install --save-dev playwright @playwright/test tsx 2>/dev/null || true
          npx playwright install chromium --with-deps

      - name: Install root deps (for tsx)
        run: npm install -g tsx

      - name: Run Steadfast Cookie Sync
        # These secrets must be set in GitHub Repository Settings → Secrets and variables → Actions
        continue-on-error: true
        env:
          COURIER_ENCRYPT_KEY: ${{ secrets.COURIER_ENCRYPT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️ CLOUDFLARE_API_TOKEN secret is not set — skipping sync."
            exit 0
          fi
          npx tsx scripts/steadfast-cookie-sync/sync.ts --all-stores
