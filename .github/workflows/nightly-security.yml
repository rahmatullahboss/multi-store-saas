# Nightly Security & Performance Scan
# Runs comprehensive security scans every night at 2 AM UTC

name: Nightly Security Scan

on:
  schedule:
    # Run at 2 AM UTC every day (8 AM Bangladesh time)
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # COMPREHENSIVE DEPENDENCY AUDIT
  # ============================================================================
  dependency-audit:
    name: 🔒 Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔒 Run npm audit (detailed)
        run: |
          npm audit --json > audit-report.json || true
          cat audit-report.json

      - name: 📊 Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30

  # ============================================================================
  # CODE SECURITY SCAN
  # ============================================================================
  code-security:
    name: 🛡️ Code Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Detect secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: 🔍 SAST scan with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/security-audit
            p/secrets
            p/owasp-top-ten
        continue-on-error: true

  # ============================================================================
  # OUTDATED DEPENDENCIES CHECK
  # ============================================================================
  outdated-check:
    name: 📦 Check Outdated Packages
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 📦 Check for outdated packages
        run: |
          npm outdated --json > outdated-report.json || true
          cat outdated-report.json

      - name: 📊 Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-packages-report
          path: outdated-report.json
          retention-days: 7

  # ============================================================================
  # TEST SUITE WITH COVERAGE TRENDING
  # ============================================================================
  nightly-tests:
    name: 🧪 Nightly Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run full test suite
        run: npm run test:coverage

      - name: 📊 Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage
          path: coverage/
          retention-days: 30

  # ============================================================================
  # GENERATE SECURITY REPORT
  # ============================================================================
  generate-report:
    name: 📋 Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-audit, code-security, outdated-check, nightly-tests]
    if: always()

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: 📋 Create summary report
        run: |
          echo "# 🔒 Nightly Security Report" > security-report.md
          echo "" >> security-report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "" >> security-report.md
          echo "| Check | Status |" >> security-report.md
          echo "|-------|--------|" >> security-report.md
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> security-report.md
          echo "| Code Security | ${{ needs.code-security.result }} |" >> security-report.md
          echo "| Outdated Check | ${{ needs.outdated-check.result }} |" >> security-report.md
          echo "| Nightly Tests | ${{ needs.nightly-tests.result }} |" >> security-report.md

          cat security-report.md

      - name: 📊 Upload summary report
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-report.md
          retention-days: 30

      - name: 🚨 Create issue if any scan failed
        if: contains(needs.*.result, 'failure')
        uses: actions/github-script@v8
        with:
          script: |
            const { repo, owner } = context.repo;

            await github.rest.issues.create({
              owner,
              repo,
              title: `🚨 Nightly Security Scan Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Nightly Security Scan Failure\n\n**Date:** ${new Date().toISOString()}\n\nOne or more security scans failed. Please review the artifacts and fix any issues.\n\n### Scan Results\n- Dependency Audit: ${{ needs.dependency-audit.result }}\n- Code Security: ${{ needs.code-security.result }}\n- Outdated Check: ${{ needs.outdated-check.result }}\n- Nightly Tests: ${{ needs.nightly-tests.result }}`,
              labels: ['security', 'nightly-scan']
            });
